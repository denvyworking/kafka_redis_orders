services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zk
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://127.0.0.1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic orders --partitions 1 --replication-factor 1"

  order-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-api
    depends_on:
      - redis
    environment:
      CONFIG_PATH: configs/prod.yaml
      HTTP_PORT: "8080"
    ports:
      - "8000:8080"

  order-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-consumer
    depends_on:
      - kafka
      - kafka-init
      - redis
    environment:
      CONFIG_PATH: configs/prod.yaml
    command: ["order-consumer"]

  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    # Если контейнер перезагрузится - данные в Redis не пропадут
    command: ["redis-server", "--appendonly", "yes"]
    # Монтируем том для хранения данных Redis
    volumes:
      - redis-data:/data

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - order-api
    command:
      - --config.file=/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    depends_on:
      - prometheus
    ports:
      - "4000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana

# Определяем том для хранения данных Redis
volumes:
  redis-data:
  grafana-data: