name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t kafka-app:${{ github.sha }} .
          docker build -t kafka-app:latest .

      - name: Test Docker image - Start services
        run: |
          docker compose up -d
          sleep 10

      - name: Test Docker image - Health check
        run: |
          echo "Checking service health..."
          docker compose ps
          docker logs order-api || true
          curl -s http://localhost:8000/health || echo "Health check not available yet"

      - name: Cleanup test environment
        if: always()
        run: |
          docker compose down -v || true

  deploy:
    name: Deploy on self-hosted runner
    runs-on: [self-hosted, Windows, X64]
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop previous containers
        continue-on-error: true
        run: docker compose down --remove-orphans

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for services to start
        run: Start-Sleep -Seconds 10

      - name: Check service status
        run: |
          docker compose ps
          curl http://localhost:8000/health
