name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test Docker Image
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: ci
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t kafka-app:${{ github.sha }} .
          docker build -t kafka-app:latest .

      - name: Test Docker image - Start services
        run: |
          docker compose -f .github/docker-compose.ci.yml up -d --build
          sleep 10

      - name: Test Docker image - Health check
        run: |
          echo "Checking service health..."
          docker compose -f .github/docker-compose.ci.yml ps
          docker compose -f .github/docker-compose.ci.yml logs order-api || true
          docker run --rm --network ci_default curlimages/curl:8.10.1 curl -s http://order-api:8080/health || echo "Health check not available yet"

      - name: Cleanup test environment
        if: always()
        run: |
          docker compose -f .github/docker-compose.ci.yml down -v || true

  deploy:
    name: Deploy on self-hosted runner
    runs-on: [self-hosted, Windows, X64]
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        shell: cmd
    env:
      PROJECT_DIR: C:\Users\denis\Desktop\Progects\Kafka

    steps:
      - name: Ensure Docker Desktop is running
        run: |
          if not exist "C:\Program Files\Docker\Docker\Docker Desktop.exe" (
            echo Docker Desktop is not installed in the default location.
            exit /b 1
          )

          docker info
          if %errorlevel% equ 0 exit /b 0

          echo Starting Docker Desktop...
          start "" "C:\Program Files\Docker\Docker\Docker Desktop.exe"

          for /l %%i in (1,1,60) do (
            docker info && exit /b 0
            powershell.exe -NoProfile -Command "Start-Sleep -Seconds 5"
          )

          echo Docker Desktop did not become ready in time.
          exit /b 1

      - name: Update local project and deploy
        run: |
          cd /d "%PROJECT_DIR%"
          git pull origin main
          docker compose down --remove-orphans
          docker compose up -d --build

      - name: Wait for services to start
        run: powershell.exe -NoProfile -Command "Start-Sleep -Seconds 10"

      - name: Check service status
        run: |
          cd /d "%PROJECT_DIR%"
          docker compose ps
          curl.exe http://localhost:8000/health
