name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & Test Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t kafka-app:${{ github.sha }} .
          docker build -t kafka-app:latest .

      - name: Test Docker image - Start services
        run: |
          docker compose up -d
          sleep 10

      - name: Test Docker image - Health check
        run: |
          echo "Checking service health..."
          docker compose ps
          docker logs order-api || true
          curl -s http://localhost:8000/health || echo "Health check not available yet"

      - name: Cleanup test environment
        if: always()
        run: |
          docker compose down -v || true

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          script: |
            set -e
            echo "Deploying to VM..."
            cd ${{ secrets.PROJECT_PATH }}
            
            echo "Pulling latest code..."
            git pull origin main
            
            echo "Building and starting containers..."
            docker compose up -d --build
            
            echo "Waiting for services to start..."
            sleep 10
            
            echo "Checking service status..."
            docker compose ps
            
            echo "Deployment completed successfully!"

      - name: Verify Deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          script: |
            echo "Service Status:"
            docker compose -f ${{ secrets.PROJECT_PATH }}/docker-compose.yml ps
