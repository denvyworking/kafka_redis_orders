name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t kafka-app:${{ github.sha }} .
          docker build -t kafka-app:latest .

      - name: Test Docker image - Start services
        run: |
          docker compose up -d
          sleep 10

      - name: Test Docker image - Health check
        run: |
          echo "Checking service health..."
          docker compose ps
          docker compose logs order-api || true
          curl -s http://localhost:8000/health || echo "Health check not available yet"

      - name: Cleanup test environment
        if: always()
        run: |
          docker compose down -v || true

  deploy:
    name: Deploy on self-hosted runner
    runs-on: [self-hosted, Windows, X64]
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure Docker Desktop is running
        run: |
          if not exist "C:\Program Files\Docker\Docker\Docker Desktop.exe" (
            echo Docker Desktop is not installed in the default location.
            exit /b 1
          )

          docker info >nul 2>&1
          if %errorlevel% equ 0 exit /b 0

          echo Starting Docker Desktop...
          start "" "C:\Program Files\Docker\Docker\Docker Desktop.exe"

          for /l %%i in (1,1,60) do (
            docker info >nul 2>&1 && exit /b 0
            timeout /t 5 /nobreak >nul
          )

          echo Docker Desktop did not become ready in time.
          exit /b 1

      - name: Remove leftover containers
        continue-on-error: true
        run: |
          for %%C in (zk kafka kafka-init order-api order-consumer redis prometheus grafana) do docker rm -f %%C 2>nul

      - name: Stop previous containers
        continue-on-error: true
        run: docker compose down --remove-orphans

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for services to start
        run: timeout /t 10 /nobreak >nul

      - name: Check service status
        run: |
          docker compose ps
          curl.exe http://localhost:8000/health
